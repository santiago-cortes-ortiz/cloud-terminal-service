name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          mkdir -p dist build

          build_target() {
            local goos="$1"
            local goarch="$2"
            local archive_os="$3"
            local archive_ext="$4"
            local binary="aws-terminal"
            local output="build/${archive_os}-${goarch}/${binary}"

            if [[ "${goos}" == "windows" ]]; then
              output="${output}.exe"
            fi

            mkdir -p "$(dirname "${output}")"
            echo "Building ${goos}/${goarch}..."
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build \
              -trimpath \
              -ldflags "-s -w -X main.version=${version}" \
              -o "${output}" \
              ./cmd/aws-terminal

            if [[ "${archive_ext}" == "zip" ]]; then
              (cd "$(dirname "${output}")" && zip -q "../../dist/aws-terminal_${version}_${archive_os}_${goarch}.zip" "$(basename "${output}")")
            else
              tar -C "$(dirname "${output}")" -czf "dist/aws-terminal_${version}_${archive_os}_${goarch}.tar.gz" "$(basename "${output}")"
            fi
          }

          build_target windows amd64 windows zip
          build_target linux amd64 linux tar.gz
          build_target darwin arm64 darwin tar.gz
          build_target darwin amd64 darwin tar.gz

          (cd dist && sha256sum * > checksums.txt)

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
