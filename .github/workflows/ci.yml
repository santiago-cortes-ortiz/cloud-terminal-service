name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Validate installer script
        run: bash -n install.sh

      - name: Run tests
        run: go test ./...

      - name: Build
        run: go build ./...
